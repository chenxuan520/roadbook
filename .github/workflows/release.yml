name: Create Release and Upload Asset

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: get_version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Set version
        run: bash scripts/update_version.sh

      - name: Zip static files
        run: zip -r static-${{ env.TAG }}.zip static/

      - name: Generate release notes (from remote script)
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/chenxuan520/gh-action-shell/main/git_commit_message_from_last_tag.sh" | bash 1>commit-message.log 2>/dev/null
          {
            echo "body<<'EOF'"
            cat commit-message.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.TAG }}
          release_name: Release ${{ env.TAG }}
          body: ${{ steps.release_notes.outputs.body }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./static-${{ env.TAG }}.zip
          asset_name: static-${{ env.TAG }}.zip
          asset_content_type: application/zip
