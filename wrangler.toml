name = 'roadbook'
main = "cloudflare/worker.js"
compatibility_date = "2024-04-01"

# 启用 Workers 日志与跟踪
[observability]
enabled = true
head_sampling_rate = 1

# 绑定 Workers AI
[ai]
binding = "AI"

# 绑定 KV 命名空间
# 注意：使用一键部署按钮时，无需填入 id。Wrangler 会自动在你的账号下创建名为 "roadbook-ROADBOOK_KV" 的命名空间。
# 如果你使用命令行手动部署，也请保持 id 为空，并在首次部署提示时让其自动创建。
[[kv_namespaces]]
binding = "ROADBOOK_KV"
# id = "c1e6c2e7951d48d59c6c3c4f8453aa12" # 请保持注释状态，由部署工具自动注入或创建

# 环境变量配置
[vars]
# JWT_SECRET = "changeme-to-a-secure-random-string-please"

# 默认启用 Cloudflare AI
USE_CF_AI = "true"
CF_AI_MODEL = "@cf/zai-org/glm-4.7-flash"

# 计划与会话过期时间 (小时)，设置为 0 表示永不过期
PLAN_TTL_HOURS = "0"

# 用户配置 (二选一)
# 方式1: 简单管理员配置
# ADMIN_USER = "admin"
# ADMIN_PASSWORD = "password"
# 方式2: 完整用户列表 JSON (优先级高于方式1)
# USERS_JSON = '{"admin":{"salt":"...","hash":"..."}}'

# 地图 API Keys
# TIAN_KEY = "75f0434f240669f4a2df6359275146d2"
# GAODE_KEY = ""
# GAODE_LOGIN_REQUIRED = "false"

# 外部 AI 配置 (如果 USE_CF_AI = "false")
# AI_ENABLED = "false"
# AI_BASE_URL = "https://api.openai.com/v1"
# AI_KEY = ""
# AI_MODEL = "gpt-3.5-turbo"

# 配置静态资源托管 (Wrangler v3+ / Cloudflare Pages)
# worker.js 会优先使用 env.ASSETS 获取资源
[assets]
directory = "./static"
binding = "ASSETS"
